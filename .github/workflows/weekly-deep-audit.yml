name: Weekly deep audit

on:
  schedule:
    - cron: "43 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-claude-code-schema-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Run offline tests and historical parity gates
        run: |
          npm run test:coverage
          npm run experiment:benchmark
      - name: Generate and validate the current exact release
        run: >-
          npm run schema:generate --
          --version latest
          --platform-package @anthropic-ai/claude-code-linux-x64
          --output .work/weekly
      - name: Compare with the currently published release
        run: |
          if [[ -f latest/manifest.json ]]; then
            npm run schema:diff -- --from latest --to .work/weekly --output .work/weekly-diff.json
          fi
      - name: Upload audit evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: weekly-deep-audit-${{ github.run_id }}
          path: |
            .work/weekly
            .work/weekly-diff.json
          if-no-files-found: error
          retention-days: 14
