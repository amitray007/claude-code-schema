name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Check formatting
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests with coverage gates
        run: npm run test:coverage
      - name: Validate historical experiments and parity benchmark
        run: npm run experiment:benchmark
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Review dependency changes with GitHub Dependency Graph
        if: vars.ENABLE_DEPENDENCY_REVIEW == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
      - name: Set up Node.js for dependency-audit fallback
        if: vars.ENABLE_DEPENDENCY_REVIEW != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Audit production dependencies when Dependency Graph is unavailable
        if: vars.ENABLE_DEPENDENCY_REVIEW != 'true'
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high
